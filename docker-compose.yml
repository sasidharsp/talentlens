version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: talentlens
      POSTGRES_DB: talentlens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:talentlens@db:5432/talentlens
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-long-random-string}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"   # expose directly for dev; remove in prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads:
